<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06284a">
  <title>野球IQアカデミー Ver4.0α.4</title>
  <link rel="stylesheet" href="style.css?v=4.0a3">
  <link rel="stylesheet" href="home-v4.css?v=4.0a4">
</head>
<body>
<main class="app">
  <section id="home" class="screen active">
    <header class="home-head">
      <div class="level"><b>★ Lv.<span data-level>1</span></b><span data-level-name>体験生</span><small>XP <span data-xp>0</span></small></div>
      <span class="version">Ver4.0α.4</span>
    </header>
    <div class="hero hero-v4">
      <img src="assets/home-team-v4.0a4.webp" alt="新しいフジコン帽とグレーのズボンを着た少年野球チーム">
    </div>
    <section class="curriculum-box"><strong id="curriculum-status"></strong><small id="promotion-status"></small></section>
    <div class="mode-grid">
      <button type="button" data-mode="defense" class="mode-card"><span>🧤</span><strong>守備編</strong><small>ランナー状況を見て判断</small></button>
      <button type="button" data-mode="runner" class="mode-card accent"><span>🏃</span><strong>ランナー編</strong><small>「自分」の走塁判断</small></button>
      <article class="mode-card locked"><span>🏏</span><strong>バッター編</strong><small>将来追加</small></article>
    </div>
  </section>

  <section id="quiz" class="screen">
    <header class="topbar">
      <button id="back-home" type="button" aria-label="ホームへ戻る">‹</button>
      <div><strong id="mode-title">守備編</strong><small id="question-count">1 / 5</small></div>
      <span class="xp-chip">XP <b data-xp>0</b></span>
    </header>

    <article class="question-card">
      <div class="tags"><span id="situation-tag">ランナー1塁</span><span id="role-tag">守備</span></div>
      <h2 id="question-text" hidden></h2>
      <p id="question-note" hidden></p>
    </article>

    <section class="field-wrap" aria-label="野球場のランナー配置">
      <div class="field" id="field">
        <div id="bso-display" aria-label="ボール0、ストライク0、アウト0">
  <div class="bso-row">
    <span class="bso-label">B</span>
    <span class="bso-dot"></span>
    <span class="bso-dot"></span>
    <span class="bso-dot"></span>
  </div>
  <div class="bso-row">
    <span class="bso-label">S</span>
    <span class="bso-dot"></span>
    <span class="bso-dot"></span>
  </div>
  <div class="bso-row">
    <span class="bso-label">O</span>
    <span id="out-light-1" class="bso-dot"></span>
    <span id="out-light-2" class="bso-dot"></span>
  </div>
</div>
        <div class="skyline"><span></span><span></span><span></span></div>
        <div class="outfield"><i></i><i></i><i></i><i></i></div>
        <div class="warning-track"></div>
        <div class="infield"></div>
        <div class="mound"></div>
        <div class="baseline baseline-first"></div>
        <div class="baseline baseline-third"></div>
        <span class="base home" aria-label="ホーム"></span>
        <span class="base first" aria-label="1塁"></span>
        <span class="base second" aria-label="2塁"></span>
        <span class="base third" aria-label="3塁"></span>
        <div id="runner-layer"></div>
        <p id="play-status"></p>
      </div>
      <p id="field-caption" hidden>ランナーの位置を見て考えよう</p>
    </section>
    <div id="play-controls">
      <div id="out-count" hidden>アウト：0</div>
  <div id="play-timer">2.0</div>
  <div id="play-action-buttons">
  <button id="infield-in-button" type="button" hidden>内野前進</button>
  <button id="touch-button" type="button">タッチ！</button>
</div>
</div>


    <div id="answers" class="answers"></div>
  </section>

  <section id="feedback" class="screen feedback">
    <div class="feedback-box">
      <div id="judge" class="judge">○</div>
      <h2 id="judge-title">最善の判断！</h2>
      <p id="feedback-text"></p>
      <div class="xp-gain">XP +<b id="gain">10</b></div>
      <button id="next" type="button">次へ</button>
    </div>
  </section>

  <section id="result" class="screen result">
    <img src="assets/captain.webp" alt="ガッツポーズするフジコンの選手">
    <div class="result-box">
      <span>ステージクリア！</span>
      <h2 id="result-title">ナイス判断！</h2>
      <p id="result-score"></p>
      <button id="retry" type="button">もう一度</button>
      <button id="result-home" type="button" class="sub">ホームへ</button>
    </div>
  </section>
</main>
<script src="questions.js?v=4.0a3"></script>
<script src="script.js?v=4.3a1"></script>
</body>
</html>
