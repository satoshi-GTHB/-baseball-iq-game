<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6b3a">
  <meta name="description" content="小学生向け野球IQクイズゲーム">
  <title>めざせ！名監督｜野球IQアカデミー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section id="start-screen" class="screen active" aria-labelledby="game-title">
      <div class="hero">
        <div class="ball" aria-hidden="true">⚾</div>
        <p class="eyebrow">野球IQアカデミー</p>
        <h1 id="game-title">めざせ！名監督</h1>
        <p class="lead">考えて、まちがえて、野球がもっとわかる。</p>
      </div>

      <div class="panel">
        <h2>サンプル簡易版</h2>
        <p>全5問。正解だけでなく、理由も学べます。</p>
        <button id="start-button" class="primary-button" type="button">ゲーム開始</button>
      </div>
    </section>

    <section id="quiz-screen" class="screen" aria-labelledby="question-text">
      <header class="quiz-header">
        <div>
          <p id="question-count" class="counter">第1問 / 5問</p>
          <p id="score-text" class="score">0点</p>
        </div>
        <div class="progress-track" aria-label="進捗">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </header>

      <div class="field-card" aria-hidden="true">
        <svg viewBox="0 0 320 220" role="img" aria-label="野球場の図">
          <path d="M160 28 L278 146 L160 210 L42 146 Z" class="infield"/>
          <path d="M160 50 L256 146 L160 198 L64 146 Z" class="grass"/>
          <rect x="151" y="20" width="18" height="18" transform="rotate(45 160 29)" class="base"/>
          <rect x="269" y="137" width="18" height="18" transform="rotate(45 278 146)" class="base"/>
          <rect x="151" y="192" width="18" height="18" transform="rotate(45 160 201)" class="base"/>
          <rect x="33" y="137" width="18" height="18" transform="rotate(45 42 146)" class="base"/>
          <circle cx="160" cy="134" r="7" class="mound"/>
        </svg>
      </div>

      <article class="question-card">
        <p id="category-label" class="category-label">守備</p>
        <h2 id="question-text">問題文</h2>
        <div id="answer-list" class="answer-list"></div>
      </article>

      <section id="feedback-box" class="feedback-box" aria-live="polite" hidden>
        <p id="feedback-title" class="feedback-title"></p>
        <p id="feedback-explanation"></p>
        <button id="next-button" class="primary-button" type="button">次の問題へ</button>
      </section>
    </section>

    <section id="result-screen" class="screen" aria-labelledby="result-title">
      <div class="result-card">
        <div class="trophy" aria-hidden="true">🏆</div>
        <p class="eyebrow">ゲーム終了</p>
        <h2 id="result-title">結果発表</h2>
        <p id="final-score" class="final-score">0 / 5問正解</p>
        <p id="result-message"></p>
        <button id="retry-button" class="primary-button" type="button">もう一度あそぶ</button>
      </div>
    </section>

    <noscript>
      <p class="noscript">このゲームを遊ぶには、JavaScriptを有効にしてください。</p>
    </noscript>
  </main>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
