<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06264a">
  <title>野球IQアカデミー 1.0β</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">

    <section id="home" class="screen active">
      <header class="home-top">
        <div class="level-card">
          <strong>★ Lv.1</strong>
          <span>見習い監督</span>
          <small>XP <b id="home-xp">0</b> / 100</small>
        </div>
        <div class="mini-actions">
          <button type="button" disabled>⚙<span>設定</span></button>
          <button type="button" disabled>🏆<span>成績</span></button>
        </div>
      </header>

      <section class="home-hero">
        <div class="home-title">
          <span class="beta">1.0β</span>
          <h1>野球<span>IQ</span>アカデミー</h1>
          <p>めざせ！名監督！</p>
        </div>
        <img src="assets/home-team.jpg" alt="ネイビーと赤のユニフォームを着た少年野球チーム">
      </section>

      <nav class="home-menu" aria-label="メインメニュー">
        <button id="go-stage" class="menu red" type="button">
          <b>⚾ はじめる</b><span>クイズに挑戦</span>
        </button>
        <button id="go-rules" class="menu" type="button">
          <b>📖 ルールを学ぶ</b><span>野球の基本を確認</span>
        </button>
        <button class="menu disabled" type="button" disabled>
          <b>👥 チーム</b><span>近日追加</span>
        </button>
        <button class="menu disabled" type="button" disabled>
          <b>🎯 今日のミッション</b><span>近日追加</span>
        </button>
      </nav>
    </section>

    <section id="stage" class="screen">
      <header class="bar">
        <button id="stage-back" class="back" type="button">‹</button>
        <div><strong>ステージ選択</strong><small>守備編</small></div>
        <span class="xp-pill">★ <b id="stage-xp">0</b></span>
      </header>

      <div class="category-tabs">
        <button class="active" type="button">守備編</button>
        <button type="button" disabled>走塁編</button>
        <button type="button" disabled>攻撃編</button>
        <button type="button" disabled>ルール編</button>
      </div>

      <div class="stage-list">
        <button id="stage-one" class="stage-card open" type="button">
          <span class="stage-no">ステージ1</span>
          <strong>守備の基本</strong>
          <span class="stars">★★★</span>
          <small>5問・まずアウトを取る考え方</small>
        </button>
        <div class="stage-card locked"><span>🔒</span><strong>フォースアウト</strong><small>次回追加</small></div>
        <div class="stage-card locked"><span>🔒</span><strong>タッチアウト</strong><small>次回追加</small></div>
      </div>
    </section>

    <section id="rules" class="screen">
      <header class="bar">
        <button id="rules-back" class="back" type="button">‹</button>
        <div><strong>ルールを学ぶ</strong><small>野球の基本</small></div>
      </header>
      <article class="lesson">
        <h2>まずはアウトを1つ取ろう</h2>
        <p>守備では、ボールを捕ったあとに「どこなら確実にアウトを取れるか」を考えます。</p>
        <div class="lesson-box">
          <b>低学年の合言葉</b>
          <span>① 状況を見る</span>
          <span>② 近くて確実なアウトを探す</span>
          <span>③ 分からなければ声を聞く</span>
        </div>
        <button id="rules-start" class="primary" type="button">クイズで確認する</button>
      </article>
    </section>

    <section id="quiz" class="screen">
      <header class="bar quiz-bar">
        <button id="quiz-back" class="back" type="button">‹</button>
        <div><strong>ステージ1</strong><small>守備の基本</small></div>
        <div class="counter"><b id="count">1 / 5</b><span class="mini-progress"><i id="progress"></i></span></div>
        <span class="xp-pill">XP <b id="xp">0</b></span>
      </header>

      <section class="question-layout">
        <article class="question-card">
          <div class="tags">
            <span id="category">守備</span>
            <span id="situation">ランナー1塁</span>
          </div>
          <small id="case">ケース1</small>
          <h2 id="question">問題文</h2>
          <button id="hint-btn" class="hint" type="button">💡 ヒントを見る</button>
          <p id="hint-text" class="hint-text" hidden></p>
        </article>

        <figure class="field-figure">
          <img src="assets/field-scene.jpg" alt="少年野球のグラウンドと選手">
          <figcaption id="field-caption">ランナーは1塁にいます</figcaption>
        </figure>
      </section>

      <div id="answers" class="answers"></div>
    </section>

    <section id="feedback" class="screen feedback-screen">
      <div class="feedback-panel">
        <div id="judge-mark" class="judge-mark">○</div>
        <h2 id="judge-title">正解！</h2>
        <p id="explanation"></p>
        <div class="xp-earned">XP +<b id="earned">10</b></div>
        <button id="next" class="primary" type="button">次の問題へ</button>
      </div>
    </section>

    <section id="result" class="screen result-screen">
      <div class="result-art">
        <img src="assets/captain.jpg" alt="ガッツポーズをする少年野球選手">
      </div>
      <div class="result-panel">
        <span>ステージクリア！</span>
        <h2>ナイス判断！</h2>
        <p class="result-score">正解数 <b id="final-score">0 / 5</b></p>
        <p id="result-message"></p>
        <button id="retry" class="primary" type="button">もう一度チャレンジ</button>
        <button id="result-home" class="secondary" type="button">ホームへ戻る</button>
      </div>
    </section>

  </main>
  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
